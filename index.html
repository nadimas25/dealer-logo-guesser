<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dealer Logo Guesser</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f172a; color: #f1f5f9;
      height: 100vh; display: flex; flex-direction: column; overflow: hidden;
    }
    header {
      background: #1e293b; padding: 12px 24px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid #334155; flex-shrink: 0;
    }
    .header-title { font-size: 18px; font-weight: 700; color: #f27423; letter-spacing: -0.02em; }
    .stat { text-align: center; }
    .stat-value { font-size: 24px; font-weight: 700; color: #f27423; }
    .stat-label { font-size: 11px; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; }
    #progress-bar { height: 3px; background: #1e293b; flex-shrink: 0; }
    #progress-fill { height: 100%; background: #f27423; transition: width 0.4s ease; width: 0%; }
    #game-area { display: flex; flex: 1; overflow: hidden; }
    #logo-panel {
      width: 300px; background: #1e293b; border-right: 1px solid #334155;
      display: flex; flex-direction: column; padding: 20px; gap: 14px;
      flex-shrink: 0; overflow-y: auto;
    }
    .section-label { font-size: 11px; color: #64748b; text-transform: uppercase; letter-spacing: 0.07em; }
    #logo-container {
      background: white; border-radius: 10px; padding: 20px;
      display: flex; align-items: center; justify-content: center;
      min-height: 160px; position: relative;
    }
    #dealer-logo { max-width: 100%; max-height: 150px; object-fit: contain; display: none; }
    #logo-loading { color: #94a3b8; font-size: 13px; }
    #logo-error { color: #ef4444; font-size: 13px; text-align: center; display: none; }
    #map-hint {
      font-size: 13px; color: #94a3b8;
      background: #0f172a; border: 1px solid #334155;
      border-radius: 8px; padding: 10px 14px;
    }
    #result-panel {
      background: #0f172a; border: 1px solid #334155;
      border-radius: 10px; padding: 16px;
      display: flex; flex-direction: column; gap: 8px;
    }
    #result-panel[hidden] { display: none; }
    #result-text { font-size: 22px; font-weight: 700; }
    #result-text.correct { color: #22c55e; }
    #result-text.close { color: #f59e0b; }
    #result-text.incorrect { color: #ef4444; }
    #points-earned { font-size: 30px; font-weight: 800; color: #f27423; line-height: 1; }
    #dealer-location { font-size: 13px; color: #94a3b8; line-height: 1.5; }
    #dealer-location strong { color: #f1f5f9; }
    #distance-info { font-size: 12px; color: #64748b; }
    #next-btn, #play-again-btn {
      background: #f27423; color: white; border: none;
      border-radius: 7px; padding: 9px 18px; font-size: 14px; font-weight: 600;
      cursor: pointer; align-self: flex-start; margin-top: 2px;
      transition: background 0.15s;
    }
    #next-btn:hover, #play-again-btn:hover { background: #e06315; }
    #map-panel { flex: 1; position: relative; }
    #map { width: 100%; height: 100%; background: #0f172a; }
    #map-loading {
      position: absolute; inset: 0; display: flex;
      align-items: center; justify-content: center;
      color: #64748b; font-size: 14px; z-index: 500; pointer-events: none;
    }
    #game-over {
      position: fixed; inset: 0; background: rgba(15,23,42,0.97);
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 20px; z-index: 2000;
    }
    #game-over[hidden] { display: none !important; }
    #game-over h2 { font-size: 36px; font-weight: 800; }
    #final-score-val { display: block; font-size: 72px; font-weight: 800; color: #f27423; line-height: 1; text-align: center; }
    #final-label { color: #94a3b8; font-size: 16px; }
    #grade { font-size: 18px; color: #cbd5e1; }
    #play-again-btn { padding: 12px 28px; font-size: 16px; align-self: center; }
    .leaflet-popup-content-wrapper {
      background: #1e293b !important; color: #f1f5f9 !important;
      border: 1px solid #334155 !important; border-radius: 8px !important;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5) !important;
    }
    .leaflet-popup-tip { background: #1e293b !important; }
    .leaflet-popup-content { margin: 10px 14px !important; }
  </style>
</head>
<body>

<header>
  <div class="header-title">Dealer Logo Guesser</div>
  <div class="stat">
    <div class="stat-value" id="score">0</div>
    <div class="stat-label">Score</div>
  </div>
  <div class="stat">
    <div class="stat-value"><span id="qnum">1</span><span style="color:#475569;font-size:15px"> / 10</span></div>
    <div class="stat-label">Round</div>
  </div>
  <div class="stat">
    <div class="stat-value" id="streak">0</div>
    <div class="stat-label">Streak</div>
  </div>
</header>

<div id="progress-bar"><div id="progress-fill"></div></div>

<div id="game-area">
  <div id="logo-panel">
    <div class="section-label">Where is this dealer?</div>
    <div id="logo-container">
      <span id="logo-loading">Loading...</span>
      <span id="logo-error">Image unavailable</span>
      <img id="dealer-logo" alt="Dealer logo" referrerpolicy="no-referrer" crossorigin="anonymous" />
    </div>
    <div id="map-hint">Click a state on the map to guess</div>
    <div id="result-panel" hidden>
      <div id="result-text"></div>
      <div id="points-earned"></div>
      <div id="dealer-location"></div>
      <div id="distance-info"></div>
      <button id="next-btn">Next &rarr;</button>
    </div>
  </div>
  <div id="map-panel">
    <div id="map-loading">Loading map...</div>
    <div id="map"></div>
  </div>
</div>

<div id="game-over" hidden>
  <h2>Game Over</h2>
  <span id="final-score-val">0</span>
  <span id="final-label">out of 10,000 points</span>
  <div id="grade"></div>
  <button id="play-again-btn">Play Again</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  IL:[40.349457,-88.986137],IN:[39.849426,-86.258278],IA:[42.011539,-93.210526],

  SC:[33.856892,-80.945007],SD:[44.299782,-99.438828],TN:[35.747845,-86.692345],
  TX:[31.054487,-97.563461],UT:[40.150032,-111.862434],VT:[44.045876,-72.710686],
  VA:[37.769337,-78.169968],WA:[47.400902,-121.490494],WV:[38.491226,-80.954453],
  WI:[44.268543,-89.616508],WY:[42.755966,-107.302490],
  DC:[38.897438,-77.026817],PR:[18.220833,-66.590149]

const STATE_NAMES = {
  AL:"Alabama",AK:"Alaska",AZ:"Arizona",AR:"Arkansas",CA:"California",
  CO:"Colorado",CT:"Connecticut",DE:"Delaware",FL:"Florida",GA:"Georgia",
  HI:"Hawaii",ID:"Idaho",IL:"Illinois",IN:"Indiana",IA:"Iowa",
  KS:"Kansas",KY:"Kentucky",LA:"Louisiana",ME:"Maine",MD:"Maryland",
  MA:"Massachusetts",MI:"Michigan",MN:"Minnesota",MS:"Mississippi",MO:"Missouri",
  MT:"Montana",NE:"Nebraska",NV:"Nevada",NH:"New Hampshire",NJ:"New Jersey",
  NM:"New Mexico",NY:"New York",NC:"North Carolina",ND:"North Dakota",OH:"Ohio",
  OK:"Oklahoma",OR:"Oregon",PA:"Pennsylvania",RI:"Rhode Island",SC:"South Carolina",
  SD:"South Dakota",TN:"Tennessee",TX:"Texas",UT:"Utah",VT:"Vermont",
  VA:"Virginia",WA:"Washington",WV:"West Virginia",WI:"Wisconsin",WY:"Wyoming",
  DC:"Washington D.C.",PR:"Puerto Rico"
};

const NAME_TO_ABBR = Object.fromEntries(Object.entries(STATE_NAMES).map(([k, v]) => [v, k]));
const QUESTIONS = 10;

let score = 0, streak = 0, qNum = 0, guessed = false;
let currentDealer = null, usedIdx = new Set();
let map = null, geojsonLayer = null, drawnLine = null;
let skipCount = 0;

function haversineKm(la1, lo1, la2, lo2) {
  const R = 6371;
  const dLa = (la2 - la1) * Math.PI / 180;
  const dLo = (lo2 - lo1) * Math.PI / 180;
  const a = Math.sin(dLa / 2) ** 2 +
    Math.cos(la1 * Math.PI / 180) * Math.cos(la2 * Math.PI / 180) * Math.sin(dLo / 2) ** 2;
  return R * 2 * Math.asin(Math.sqrt(a));
}

function calcScore(guessAbbr, correctAbbr) {
  if (guessAbbr === correctAbbr) return 1000;
  const g = STATE_CENTROIDS[guessAbbr];
  const c = STATE_CENTROIDS[correctAbbr];
  if (!g || !c) return 0;
  const dist = haversineKm(g[0], g[1], c[0], c[1]);
  return Math.max(0, Math.round(1000 * Math.exp(-dist / 1200)));
}

function pickDealer() {
  if (usedIdx.size >= DEALERS.length) usedIdx.clear();
  let i;
  do { i = Math.floor(Math.random() * DEALERS.length); } while (usedIdx.has(i));
  usedIdx.add(i);
  return Object.assign({}, DEALERS[i]);
}

function stateStyle() {
  return { fillColor: '#1e3a5f', fillOpacity: 0.7, color: '#334155', weight: 1 };
}

function initMap() {
  map = L.map('map', {
    center: [39, -98], zoom: 4,
    zoomControl: true, scrollWheelZoom: false, attributionControl: false
  });

  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png', {
    maxZoom: 10
  }).addTo(map);

  fetch('https://raw.githubusercontent.com/PublicaMundi/MappingAPI/master/data/geojson/us-states.json')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      document.getElementById('map-loading').style.display = 'none';
      geojsonLayer = L.geoJSON(data, {
        style: stateStyle,
        onEachFeature: function(feature, layer) {
          layer.on({
            mouseover: function(e) {
              if (!guessed) e.target.setStyle({ fillColor: '#2563eb', fillOpacity: 0.85 });
            },
            mouseout: function(e) {
              if (!guessed) e.target.setStyle(stateStyle());
            },
            click: function(e) {
              if (guessed) return;
              var abbr = NAME_TO_ABBR[e.target.feature.properties.name];
              if (abbr) handleGuess(abbr);
            }
          });
        }
      }).addTo(map);
    });
}

function highlightState(abbr, color) {
  if (!geojsonLayer) return;
  geojsonLayer.eachLayer(function(l) {
    if (NAME_TO_ABBR[l.feature.properties.name] === abbr) {
      l.setStyle({ fillColor: color, fillOpacity: 0.9, color: '#fff', weight: 2 });
    }
  });
}

function escHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

function handleGuess(guessAbbr) {
  guessed = true;
  var correctAbbr = currentDealer.state;
  var pts = calcScore(guessAbbr, correctAbbr);
  score += pts;
  streak = (guessAbbr === correctAbbr) ? streak + 1 : 0;

  highlightState(correctAbbr, '#22c55e');
  if (guessAbbr !== correctAbbr) {
    highlightState(guessAbbr, '#ef4444');
    var g = STATE_CENTROIDS[guessAbbr];
    var c = STATE_CENTROIDS[correctAbbr];
    if (g && c) {
      drawnLine = L.polyline([g, c], {
        color: '#f27423', weight: 2, dashArray: '6,6', opacity: 0.8
      }).addTo(map);
    }
  }

  document.getElementById('score').textContent = score.toLocaleString();
  document.getElementById('streak').textContent = streak;

  var rt = document.getElementById('result-text');
  if (guessAbbr === correctAbbr) {
    rt.textContent = 'Correct!'; rt.className = 'correct';
  } else if (pts > 500) {
    rt.textContent = 'Close!'; rt.className = 'close';
  } else {
    rt.textContent = 'Wrong'; rt.className = 'incorrect';
  }

  document.getElementById('points-earned').textContent = '+' + pts.toLocaleString() + ' pts';
  document.getElementById('dealer-location').innerHTML =
    '<strong>' + escHtml(currentDealer.name) + '</strong><br>' +
    escHtml(currentDealer.city) + ', ' + correctAbbr;

  var distEl = document.getElementById('distance-info');
  if (guessAbbr !== correctAbbr) {
    var gc = STATE_CENTROIDS[guessAbbr];
    var cc = STATE_CENTROIDS[correctAbbr];
    if (gc && cc) {
      var km = Math.round(haversineKm(gc[0], gc[1], cc[0], cc[1]));
      distEl.textContent = Math.round(km * 0.621) + ' miles off';
    }
  } else {
    distEl.textContent = '';
  }

  document.getElementById('map-hint').textContent = (guessAbbr === correctAbbr)
    ? 'Yes! ' + STATE_NAMES[correctAbbr]
    : 'It was ' + STATE_NAMES[correctAbbr];

  document.getElementById('result-panel').hidden = false;
}

function resetMapStyles() {
  if (geojsonLayer) geojsonLayer.eachLayer(function(l) { l.setStyle(stateStyle()); });
  if (drawnLine) { map.removeLayer(drawnLine); drawnLine = null; }
}

function nextQuestion() {
  qNum++;
  if (qNum >= QUESTIONS) { endGame(); return; }
  resetMapStyles();
  guessed = false;
  document.getElementById('result-panel').hidden = true;
  loadQuestion();
}

function loadQuestion() {
  currentDealer = pickDealer();
  skipCount = 0;
  document.getElementById('qnum').textContent = qNum + 1;
  document.getElementById('progress-fill').style.width = (qNum / QUESTIONS * 100) + '%';
  document.getElementById('map-hint').textContent = 'Click a state on the map to guess';

  var img = document.getElementById('dealer-logo');
  var loading = document.getElementById('logo-loading');
  var errEl = document.getElementById('logo-error');
  img.style.display = 'none';
  errEl.style.display = 'none';
  loading.style.display = 'block';

  img.onload = function() {
    loading.style.display = 'none';
    img.style.display = 'block';
  };
  img.onerror = function() {
    skipCount++;
    if (skipCount > 15) {
      loading.style.display = 'none';
      errEl.style.display = 'block';
      return;
    }
    currentDealer = pickDealer();
    img.src = currentDealer.logo;
  };
  img.src = currentDealer.logo;
}

function endGame() {
  document.getElementById('progress-fill').style.width = '100%';
  document.getElementById('final-score-val').textContent = score.toLocaleString();
  var pct = score / (QUESTIONS * 1000);
  var grade;
  if (pct >= 0.9) grade = 'Expert dealer geography!';
  else if (pct >= 0.7) grade = 'Great geographic knowledge';
  else if (pct >= 0.5) grade = 'Not bad — solid mid-tier';
  else if (pct >= 0.3) grade = 'Rough — study up!';
  else grade = 'Keep practicing!';
  document.getElementById('grade').textContent = grade;
  document.getElementById('game-over').hidden = false;
}

function startGame() {
  score = 0; streak = 0; qNum = 0; guessed = false; usedIdx.clear();
  document.getElementById('score').textContent = '0';
  document.getElementById('streak').textContent = '0';
  document.getElementById('progress-fill').style.width = '0%';
  document.getElementById('game-over').hidden = true;
  document.getElementById('result-panel').hidden = true;
  resetMapStyles();
  loadQuestion();
}

document.getElementById('next-btn').addEventListener('click', nextQuestion);
document.getElementById('play-again-btn').addEventListener('click', startGame);

initMap();
startGame();
</script>
